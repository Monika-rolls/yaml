paths:
  '/analytics/agent/call/{typeOfCall}/{startEpoch}/{endEpoch}/{perPage}/{pageNo}':
    post:
      operationId: analyticsService_getAgentCallAnalytics
      tags:
        - Analytics
      summary: Get per-agent call analytics (paginated)
      parameters:
        - name: typeOfCall
          in: path
          required: true
          schema:
            type: string
            enum:
              - inbound
              - outbound
              - overall
        - name: startEpoch
          in: path
          required: true
          schema:
            type: integer
        - name: endEpoch
          in: path
          required: true
          schema:
            type: integer
        - name: perPage
          in: path
          required: true
          schema:
            type: integer
        - name: pageNo
          in: path
          required: true
          schema:
            type: integer
        - name: timeZoneOffset
          in: query
          required: true
          schema:
            type: integer
        - name: sortOrder
          in: query
          required: true
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: sortBy
          in: query
          required: true
          schema:
            type: string
            enum:
              - totalCalls
              - connectedCalls
              - totalTalktime
              - averageTalktime
        - name: callMedium
          in: query
          required: false
          schema:
            type: string
            enum:
              - gsm
              - ct
              - all
        - name: isUnique
          in: query
          required: false
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
              required:
                - ids
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCallAnalyticsResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
