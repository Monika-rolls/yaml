components:
  schemas:
    AICallAnalysis:
      type: object
      properties:
        noOfCredits:
          type: integer
          format: int64
      required:
        - noOfCredits
    AICallAnalysisCredits:
      type: object
      properties:
        aiCallAnalysiCredits (availableCredits):
          type: integer
          format: int64
        creditType:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CreditType'
        paidCredits:
          type: integer
          format: int64
        promoCredits:
          type: integer
          format: int64
      required:
        - aiCallAnalysiCredits (availableCredits)
        - promoCredits
        - paidCredits
    AICallSentimentAnalysis:
      type: object
      properties:
        day:
          type: integer
          format: int64
        negative:
          type: integer
          format: int64
        neutral:
          type: integer
          format: int64
        positive:
          type: integer
          format: int64
      required:
        - positive
        - neutral
        - negative
        - day
    AICallSentimentAnalysisResponse:
      type: object
      properties:
        data:
          nullable: true
          type: array
          items:
            $ref: '#/components/schemas/AICallSentimentAnalysis'
        message:
          type: string
        statusCode:
          type: integer
          format: int64
      required:
        - statusCode
        - message
    AICreditUsage:
      type: object
      properties:
        key:
          type: number
          format: double
        totalCredits:
          type: number
          format: double
      required:
        - key
        - totalCredits
    AICreditUsageResponse:
      type: object
      properties:
        data:
          nullable: true
          type: array
          items:
            $ref: '#/components/schemas/AICreditUsage'
        message:
          type: string
        statusCode:
          type: integer
          format: int64
      required:
        - statusCode
        - message
    AICreditsResponse:
      type: object
      properties:
        data:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AICallAnalysisCredits'
        message:
          type: string
        statusCode:
          type: integer
          format: int64
      required:
        - statusCode
        - message
    Access:
      type: object
      properties:
        access:
          type: boolean
      required:
        - access
    AccessTo:
      type: object
      properties:
        id:
          nullable: true
          type: string
        name:
          nullable: true
          type: string
    ActionItem:
      type: object
      properties:
        action_item (actionItem):
          type: string
        assignee:
          $ref: '#/components/schemas/Speaker'
        deadline:
          type: string
      required:
        - assignee
        - action_item (actionItem)
        - deadline
    AddOn:
      type: object
      properties:
        aiCallAnalysis:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AICallAnalysis'
        waba:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Waba2'
    AddOnData:
      type: object
      properties:
        aiCallAnalysis:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AiCallAnalysisAddOn'
        waba:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/WabaAddOn'
    AddOns:
      type: object
      properties:
        waba:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Waba'
    AddonDetails:
      type: object
      properties:
        aiCallAnlys:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AiCallAnalysisDetails'
        waba:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/WabaDetails'
    Address:
      type: object
      properties:
        city:
          nullable: true
          type: string
        country:
          nullable: true
          type: string
