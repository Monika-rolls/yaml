          nullable: true
          type: string
        pobox:
          nullable: true
          type: string
        state:
          nullable: true
          type: string
        street:
          nullable: true
          type: string
      required:
        - defaultFieldsMap
    Address2:
      type: object
      properties:
        city:
          nullable: true
          type: string
        country:
          nullable: true
          type: string
        countryCode:
          nullable: true
          type: string
        state:
          nullable: true
          type: string
        street:
          nullable: true
          type: string
        type:
          nullable: true
          type: string
        zip:
          nullable: true
          type: string
